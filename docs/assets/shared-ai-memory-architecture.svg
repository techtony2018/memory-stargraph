<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1250" viewBox="0 0 2000 1250" role="img" aria-labelledby="title desc">
  <title id="title">Shared AI Memory Architecture</title>
  <desc id="desc">Architecture poster for Memory Stargraph, GBrain, shared database, file storage, distributed hosts, AI agents, and tailnet users.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="74%">
      <stop offset="0%" stop-color="#15224a"/>
      <stop offset="42%" stop-color="#080d23"/>
      <stop offset="100%" stop-color="#030611"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7c9"/>
      <stop offset="24%" stop-color="#7df9ff"/>
      <stop offset="62%" stop-color="#7a5cff" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#7a5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mediaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#77ffd6"/>
      <stop offset="52%" stop-color="#1bbdff" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#1bbdff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17213f" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#071024" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="panelWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f42" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#111529" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e2d31" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#071424" stop-opacity="0.84"/>
    </linearGradient>
    <linearGradient id="lineBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#77f5ff" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#77f5ff" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#77f5ff" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lineGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd36b" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#ffd36b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffd36b" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="lineGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#79ffcb" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#79ffcb" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#79ffcb" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tinyGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#88f6ff"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd36b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#79ffcb"/>
    </marker>
    <style>
      .title{font:800 52px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7fbff;letter-spacing:.3px}
      .subtitle{font:500 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#aebbe6}
      .eyebrow{font:800 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#8df7ff;letter-spacing:2.4px;text-transform:uppercase}
      .panel-title{font:800 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f2f7ff}
      .panel-sub{font:600 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#afbadc}
      .label{font:700 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#eef6ff}
      .small{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#b7c3e7}
      .tiny{font:600 11px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#8f9fc7}
      .mono{font:700 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#e8f9ff}
      .chip{font:800 12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#06101f}
      .panel{fill:url(#panel);stroke:#2e416f;stroke-width:1.3}
      .panel-warm{fill:url(#panelWarm);stroke:#60427c;stroke-width:1.3}
      .panel-green{fill:url(#panelGreen);stroke:#2a6d72;stroke-width:1.3}
      .route{fill:none;stroke:url(#lineBlue);stroke-width:2.5;marker-end:url(#arrowCyan)}
      .route-soft{fill:none;stroke:#5d6eac;stroke-width:1.2;opacity:.34}
      .route-gold{fill:none;stroke:url(#lineGold);stroke-width:2.5;marker-end:url(#arrowGold)}
      .route-green{fill:none;stroke:url(#lineGreen);stroke-width:2.5;marker-end:url(#arrowGreen)}
      .orbit{fill:none;stroke:#31406d;stroke-width:1.1;opacity:.55}
      .boundary{fill:none;stroke:#8df7ff;stroke-width:2;stroke-dasharray:10 9;opacity:.55}
      .node{filter:url(#tinyGlow)}
    </style>
  </defs>

  <rect width="2000" height="1250" fill="url(#bg)"/>
  <g opacity=".5">
    <circle cx="86" cy="118" r="1.8" fill="#88f6ff"/><circle cx="142" cy="240" r="1.2" fill="#ffffff"/><circle cx="286" cy="116" r="1.4" fill="#ffd36b"/>
    <circle cx="428" cy="214" r="1.2" fill="#88f6ff"/><circle cx="628" cy="86" r="1.7" fill="#ffffff"/><circle cx="812" cy="162" r="1.1" fill="#79ffcb"/>
    <circle cx="1042" cy="96" r="1.5" fill="#ffd36b"/><circle cx="1262" cy="176" r="1.2" fill="#88f6ff"/><circle cx="1456" cy="82" r="1.8" fill="#ffffff"/>
    <circle cx="1694" cy="212" r="1.3" fill="#79ffcb"/><circle cx="1588" cy="1020" r="1.5" fill="#ffd36b"/><circle cx="1374" cy="1098" r="1.2" fill="#ffffff"/>
    <circle cx="1056" cy="1046" r="1.5" fill="#88f6ff"/><circle cx="714" cy="1120" r="1.1" fill="#79ffcb"/><circle cx="388" cy="1026" r="1.5" fill="#ffffff"/>
    <circle cx="142" cy="996" r="1.4" fill="#ffd36b"/><circle cx="94" cy="674" r="1.3" fill="#88f6ff"/><circle cx="1712" cy="642" r="1.5" fill="#ffffff"/>
  </g>

  <text x="90" y="82" class="eyebrow">Shared AI Memory</text>
  <text x="90" y="138" class="title">Memory Stargraph + GBrain Architecture</text>
  <text x="92" y="174" class="subtitle">A tailnet-only shared memory system for agents, services, database records, files, media caches, and users.</text>

  <g transform="translate(80 228)">
    <rect width="310" height="770" rx="22" class="panel"/>
    <text x="28" y="46" class="eyebrow">Users And Agents</text>
    <text x="28" y="86" class="panel-title">AI Workbench Edge</text>
    <text x="28" y="116" class="panel-sub">Operators and agent clusters share</text>
    <text x="28" y="138" class="panel-sub">one durable memory surface.</text>

    <g transform="translate(28 168)">
      <circle cx="28" cy="28" r="19" fill="#88f6ff" filter="url(#tinyGlow)"/>
      <text x="68" y="25" class="label">Codex / OpenClaw</text>
      <text x="68" y="48" class="small">multi-host AI agents</text>
    </g>
    <g transform="translate(28 256)">
      <circle cx="28" cy="28" r="19" fill="#ffd36b" filter="url(#tinyGlow)"/>
      <text x="68" y="25" class="label">Web UI Users</text>
      <text x="68" y="48" class="small">search, view, attach, edit</text>
    </g>
    <g transform="translate(28 344)">
      <circle cx="28" cy="28" r="19" fill="#b28cff" filter="url(#tinyGlow)"/>
      <text x="68" y="25" class="label">Browser Sessions</text>
      <text x="68" y="48" class="small">desktop and mobile</text>
    </g>
    <g transform="translate(28 456)">
      <rect width="248" height="84" rx="14" fill="#0a152b" stroke="#334a7c"/>
      <text x="18" y="29" class="mono">gbrain get / put</text>
      <text x="18" y="53" class="mono">gbrain files upload</text>
      <text x="18" y="76" class="tiny">writes pages, links, media refs</text>
    </g>
    <g transform="translate(28 584)">
      <rect width="248" height="96" rx="14" fill="#061a20" stroke="#2d757b"/>
      <text x="18" y="31" class="mono">HTTPS tailnet only</text>
      <text x="18" y="56" class="small">Tailscale Serve terminates TLS</text>
      <text x="18" y="80" class="tiny">no public Funnel enabled</text>
    </g>
  </g>

  <g transform="translate(528 250)">
    <ellipse cx="370" cy="334" rx="350" ry="292" class="orbit"/>
    <ellipse cx="370" cy="334" rx="278" ry="222" class="orbit"/>
    <ellipse cx="370" cy="334" rx="206" ry="156" class="orbit"/>
    <circle cx="370" cy="334" r="154" fill="url(#coreGlow)" filter="url(#softGlow)" opacity=".96"/>
    <circle cx="370" cy="334" r="88" fill="#071426" stroke="#98fbff" stroke-width="2.2"/>
    <text x="370" y="304" class="eyebrow" text-anchor="middle">Shared Core</text>
    <text x="370" y="342" class="panel-title" text-anchor="middle">GBrain</text>
    <text x="370" y="370" class="small" text-anchor="middle">CLI + MCP + typed links</text>
    <text x="370" y="394" class="tiny" text-anchor="middle">canonical memory API</text>

    <g transform="translate(82 48)">
      <rect width="214" height="118" rx="18" class="panel-warm"/>
      <text x="24" y="38" class="label">Postgres DB</text>
      <text x="24" y="66" class="small">pages, links, timeline</text>
      <text x="24" y="91" class="mono">files.storage_path</text>
    </g>
    <g transform="translate(440 42)">
      <rect width="228" height="128" rx="18" class="panel-green"/>
      <text x="24" y="40" class="label">Brain Repo FS</text>
      <text x="24" y="69" class="small">markdown pages</text>
      <text x="24" y="94" class="mono">/Users/.../brain</text>
    </g>
    <g transform="translate(72 520)">
      <rect width="252" height="126" rx="18" class="panel-green"/>
      <text x="24" y="40" class="label">GBrain File Store</text>
      <text x="24" y="68" class="small">binary bytes live on disk</text>
      <text x="24" y="94" class="mono">gbrain:files/&lt;path&gt;</text>
    </g>
    <g transform="translate(448 520)">
      <rect width="248" height="126" rx="18" class="panel"/>
      <text x="24" y="40" class="label">MCP Server</text>
      <text x="24" y="68" class="small">OAuth, remote agents</text>
      <text x="24" y="94" class="mono">get/search/graph</text>
    </g>
  </g>

  <g transform="translate(1450 228)">
    <rect width="420" height="770" rx="22" class="panel"/>
    <text x="30" y="46" class="eyebrow">Distributed Services</text>
    <text x="30" y="86" class="panel-title">Memory Stargraph Hosts</text>
    <text x="30" y="116" class="panel-sub">Each host renders the star map and keeps a local graph/media cache.</text>

    <g transform="translate(30 164)">
      <rect width="360" height="138" rx="18" class="panel-green"/>
      <circle cx="42" cy="42" r="18" fill="#79ffcb" filter="url(#tinyGlow)"/>
      <text x="78" y="39" class="label">GBrain Host Service</text>
      <text x="78" y="64" class="small">.85 / tailnet HTTPS source</text>
      <text x="24" y="101" class="mono">/gbrain-files/&lt;path&gt;</text>
      <text x="24" y="124" class="tiny">recovers from brain repo store</text>
    </g>

    <g transform="translate(30 336)">
      <rect width="360" height="126" rx="18" class="panel"/>
      <circle cx="42" cy="42" r="18" fill="#88f6ff" filter="url(#tinyGlow)"/>
      <text x="78" y="39" class="label">Remote Stargraph</text>
      <text x="78" y="64" class="small">.102 service + local cache</text>
      <text x="24" y="101" class="mono">pulls HTTPS /gbrain-files</text>
    </g>

    <g transform="translate(30 494)">
      <rect width="360" height="126" rx="18" class="panel"/>
      <circle cx="42" cy="42" r="18" fill="#b28cff" filter="url(#tinyGlow)"/>
      <text x="78" y="39" class="label">Local Stargraph</text>
      <text x="78" y="64" class="small">developer machine UI</text>
      <text x="24" y="101" class="mono">graph_cache.json + /media</text>
    </g>

    <g transform="translate(30 654)">
      <rect width="360" height="72" rx="16" fill="#071426" stroke="#35588d"/>
      <text x="22" y="30" class="mono">No Tailscale Funnel</text>
      <text x="22" y="53" class="small">outside internet cannot access</text>
    </g>
  </g>

  <g transform="translate(484 878)">
    <rect width="780" height="200" rx="24" class="panel-green"/>
    <text x="32" y="48" class="eyebrow">Media Recovery Belt</text>
    <text x="32" y="88" class="panel-title">Cache Miss Flow For Images And Attachments</text>
    <text x="32" y="120" class="small">When a node references gbrain:files/path and a Stargraph /media cache is empty, the service materializes bytes from the nearest durable source.</text>
    <g transform="translate(34 146)">
      <rect width="126" height="34" rx="17" fill="#79ffcb"/><text x="63" y="23" class="chip" text-anchor="middle">/media cache</text>
      <rect x="178" width="154" height="34" rx="17" fill="#88f6ff"/><text x="255" y="23" class="chip" text-anchor="middle">/gbrain-files</text>
      <rect x="350" width="176" height="34" rx="17" fill="#ffd36b"/><text x="438" y="23" class="chip" text-anchor="middle">brain repo store</text>
      <rect x="548" width="160" height="34" rx="17" fill="#b28cff"/><text x="628" y="23" class="chip" text-anchor="middle">signed URL</text>
    </g>
  </g>

  <path d="M390 588 C500 560 560 520 630 512" class="route"/>
  <text x="426" y="535" class="tiny">agents call gbrain MCP / CLI</text>
  <path d="M794 414 C734 356 700 330 626 314" class="route-gold"/>
  <text x="662" y="352" class="tiny">pages + links</text>
  <path d="M1000 416 C1080 354 1118 330 1194 322" class="route-gold"/>
  <text x="1062" y="350" class="tiny">markdown repo</text>
  <path d="M806 674 C760 742 720 778 662 792" class="route-green"/>
  <text x="696" y="744" class="tiny">storage_path points to bytes</text>
  <path d="M1042 668 C1220 694 1338 718 1480 752" class="route"/>
  <text x="1192" y="704" class="tiny">remote reads</text>
  <path d="M1416 410 C1288 394 1168 386 1040 394" class="route-soft"/>
  <path d="M1418 550 C1252 558 1118 592 996 656" class="route-soft"/>
  <path d="M1416 708 C1248 742 1110 784 1004 884" class="route-soft"/>
  <path d="M884 878 C884 806 892 724 900 496" class="route-green"/>
  <text x="912" y="820" class="tiny">cache miss recovery</text>
  <path d="M1436 718 C1268 820 1110 900 946 982" class="route-green"/>
  <text x="1218" y="846" class="tiny">HTTPS pull from GBrain host</text>

  <rect x="34" y="206" width="1932" height="916" rx="34" class="boundary"/>
  <text x="1452" y="1098" class="mono">Tailscale Tailnet Boundary</text>
  <text x="1452" y="1124" class="small">HTTPS certs on tailnet DNS names; public internet blocked unless Funnel is enabled.</text>

  <g opacity=".42">
    <path d="M466 300 C782 176 1252 176 1530 314" class="route-soft"/>
    <path d="M428 964 C762 1130 1238 1112 1530 954" class="route-soft"/>
    <path d="M214 408 C600 168 1310 132 1756 442" class="route-soft"/>
    <path d="M214 836 C666 1096 1360 1076 1756 804" class="route-soft"/>
  </g>
</svg>
